name: Deploy AirGuard Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 157.173.116.245 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no administrator@157.173.116.245 << 'DEPLOY'
            cd /home/administrator/airguard-dashboard
            git pull origin main
            docker compose up -d --build
            echo "Dashboard deployed at $(date)"
          DEPLOY
