services:
  airguard-dashboard:
    build: .
    container_name: airguard-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.airguard-cm.duckdns.org/api/v1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
